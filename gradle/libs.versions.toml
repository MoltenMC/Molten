[versions]
kotlin = "2.4.0"
netty = "5.0.0.Alpha5"
raknetty = "1.0.4"
anvil = "1.0.1"
leveldb = "1.0.1"
nbt = "1.0.1"
mavenPublish = "0.37.0"

[libraries]
molten-nbt = { module = "io.github.moltenmc:nbt", version.ref = "nbt" }
molten-leveldb = { module = "io.github.moltenmc:leveldb", version.ref = "leveldb" }
molten-anvil = { module = "io.github.moltenmc:anvil", version.ref = "anvil" }
netty-buffer = { module = "io.netty:netty5-buffer", version.ref = "netty" }
netty-common = { module = "io.netty:netty5-common", version.ref = "netty" }
netty-transport = { module = "io.netty:netty5-transport", version.ref = "netty" }
raknetty-core = { module = "io.github.moltenmc.raknetty:raknetty-core", version.ref = "raknetty" }
raknetty-codec = { module = "io.github.moltenmc.raknetty:raknetty-codec", version.ref = "raknetty" }
raknetty-handler = { module = "io.github.moltenmc.raknetty:raknetty-handler", version.ref = "raknetty" }
raknetty-transport = { module = "io.github.moltenmc.raknetty:raknetty-transport", version.ref = "raknetty" }
